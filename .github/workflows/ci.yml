name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Compile Python modules
        run: python -m compileall app scripts

      - name: Validate Docker Compose config
        run: |
          # CI 没有真实 .env，用模板文件只验证 compose 结构，不引入生产密钥。
          cp .env.example .env
          docker compose config

      - name: Guard against real trading calls
        run: python scripts/check_no_real_trading_calls.py
