name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Compile Python modules
        run: python -m compileall app scripts

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Guard against real trading calls
        run: |
          ! grep -RInE 'exchange\.create_order|set_leverage|create_market_order|market order' app scripts tests
