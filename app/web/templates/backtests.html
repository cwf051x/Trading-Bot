{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Backtests</h1>
    <p class="lead">Run the current MomentumOIStrategy against stored OHLCV CSV files and refresh the equity curve export.</p>
  </div>
  <span class="badge">{{ csv_files|length }} CSV files</span>
</div>

<form method="post" action="/backtests/run" class="panel">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <div class="toolbar">
    <label style="min-width: min(520px, 100%);">
      CSV File
      <select name="csv_file" required>
        {% for path in csv_files %}
          <option value="{{ path.name }}">{{ path.name }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v18"></path><path d="m19 12-8-6v12Z"></path></svg>
      Run Backtest
    </button>
  </div>
</form>

<div class="section">
  <h2>Summary</h2>
  {% include "partials/summary_table.html" %}
</div>
{% endblock %}
