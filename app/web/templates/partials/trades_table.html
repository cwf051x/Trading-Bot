{% if rows %}
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Symbol</th>
        <th>Side</th>
        <th>Quantity</th>
        <th>Entry</th>
        <th>Exit</th>
        <th>PnL</th>
        <th>Reason</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.symbol }}</td>
        <td>{{ row.side }}</td>
        <td>{{ row.quantity }}</td>
        <td>{{ row.entry_price }}</td>
        <td>{{ row.exit_price }}</td>
        <td>{{ row.pnl }}</td>
        <td>{{ row.exit_reason }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty">No trades yet.</div>
{% endif %}
