services:
  trading-bot:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.11"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backtests:/app/backtests
      - ./logs:/app/logs
    command: ["sh", "-c", "python -u -m app.main --mode paper 2>&1 | tee -a /app/logs/trading_bot.log"]
    restart: unless-stopped

  admin-web:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.11"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./backtests:/app/backtests
      - ./logs:/app/logs
    environment:
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    command: ["sh", "-c", "uvicorn app.web.server:app --host 0.0.0.0 --port 8000 2>&1 | tee -a /app/logs/admin_web.log"]
    restart: unless-stopped

  alert-radar:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.11"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["sh", "-c", "python -u scripts/run_alert_radar_loop.py 2>&1 | tee -a /app/logs/alert_radar.log"]
    restart: unless-stopped
